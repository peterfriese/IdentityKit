name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Generate and Deploy Documentation
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build DocC
        run: |
          swift package --allow-writing-to-directory .build/documentation \
            generate-documentation --target IdentityKit --disable-indexing \
            --transform-for-static-hosting --hosting-base-path IdentityKit \
            --output-path .build/documentation

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .build/documentation

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
