name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docc:
    name: Generate Documentation
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Generate Documentation
        run: |
          swift package --allow-writing-to-directory .build/documentation \
            generate-documentation --target IdentityKit --disable-indexing \
            --transform-for-static-hosting --hosting-base-path IdentityKit \
            --output-path .build/documentation

      - name: Upload Documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: .build/documentation